<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>💕 Our Anniversary</h1>
            <p class="subtitle">Cherish our beautiful memories together</p>

            <!-- Memory Gallery -->
            <div id="gallery" class="gallery"></div>

            <!-- Add Memory Section -->
            <div class="input-section">
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button class="btn btn-primary" onclick="document.getElementById('imageInput').click()">
                    ➕ Add Memory
                </button>
            </div>

            <!-- Custom Text Input -->
            <div class="input-section">
                <input type="text" id="customText" placeholder="Add a caption or message..." maxlength="200">
                <button class="btn btn-secondary" onclick="addCustomMemory()">Add Text</button>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button class="btn btn-share" onclick="generateLink()">🔗 Generate Share Link</button>
                <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
            </div>

            <!-- Share Link Modal -->
            <div id="linkModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Share Your Memories</h2>
                    <p class="info">Copy this link to share with your special someone:</p>
                    <div class="link-box">
                        <input type="text" id="shareLink" readonly>
                        <button class="btn btn-primary" onclick="copyLink()">📋 Copy</button>
                    </div>
                    <p class="info-small">✅ Works on any device (phone, tablet, computer)</p>
                    <p class="info-small">📤 Share via WhatsApp, Email, or Message</p>
                    <button class="btn btn-secondary" onclick="closeModal()">Close</button>
                </div>
            </div>

            <!-- Image Preview Modal -->
            <div id="previewModal" class="modal hidden">
                <div class="preview-content">
                    <span class="close" onclick="closePreview()">&times;</span>
                    <img id="previewImage" src="">
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
